<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scratch & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 20px; padding: 15px; background: #111; border-radius: 10px; }
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #00c853;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.btn:active { transform: scale(0.95); }
.hidden { display: none; }
input, select {
  padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: none;
}
#joinPopup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  z-index: 9999;
}
#joinPopup button {
  background: #00c853;
  color: #fff;
  padding: 12px 20px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
}
canvas { border-radius: 10px; display: block; margin: 10px auto; }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<div id="joinPopup">
  <h2>📢 Join Our Telegram Channel to Continue</h2>
  <p>You must join before using the app.</p>
  <button onclick="joinChannelClicked()">👉 Join @earnzoners</button>
</div>

<div id="mainPage" style="display:none;">

<h1>⚡ Scratch & Earn Points</h1>
<p>Points: <span id="points">0</span> | Energy: <span id="energy">50</span></p>

<div class="section">
  <canvas id="scratchCanvas" width="300" height="200"></canvas>
  <p id="scratchMsg">🖐️ Start scratching...</p>
  <div class="btn hidden" id="claimBtn">🎁 Claim 3000 Points</div>
</div>

<div class="section">
<h2>📋 Tasks</h2>
<div id="taskIntro">
  <div class="btn" id="startTasksBtn">Start Tasks</div>
</div>
<div id="adsgram-container" class="hidden"></div>
<div id="nextTaskBtnContainer" class="hidden">
  <div class="btn" id="nextTaskBtn">➡️ Next Task</div>
</div>
<div id="finalTaskBtnContainer" class="hidden">
  <div class="btn" id="finalTaskBtn">🏁 Finish Tasks</div>
</div>
</div>

<div class="section">
<h2>💳 Withdraw</h2>
<p><b>Minimum withdrawal is 250,000 points</b></p>
<select id="method">
<option value="Litecoin">Litecoin</option>
<option value="USDT">USDT</option>
<option value="Payeer">Payeer</option>
<option value="Bank">Bank Account</option>
</select>
<input type="text" id="address" placeholder="Enter wallet or account"/>
<input type="number" id="amount" placeholder="Minimum 250000"/>
<div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

</div>

<script>
const webApp = Telegram.WebApp;
let points = parseInt(localStorage.getItem("points") || "0");
let energy = parseInt(localStorage.getItem("energy") || "50");

function updateUI(){
  document.getElementById("points").innerText = points;
  document.getElementById("energy").innerText = energy;
}
function saveState(){
  localStorage.setItem("points", points);
  localStorage.setItem("energy", energy);
}

/* JOIN */
function joinChannelClicked(){
  window.open("https://t.me/crytocurrentupdate","_blank");
  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainPage").style.display="block";
}

function showJoinPopupAfterAds(){
  try{
    const rewardAd = window.Adsgram.init({blockId:"23731"});
    rewardAd.show().finally(()=>{
      document.getElementById("joinPopup").style.display="flex";
    });
  }catch(e){
    document.getElementById("joinPopup").style.display="flex";
  }
}

/* ================= SCRATCH SYSTEM ================= */
const rewardBlocks = ["23731","23732","23734"];
let scratchCount = 0;
let claimAvailable = false;
let rewardCooldown = false;
let scratchTimerStarted = false;
let adsShownBeforeClaim = 0;

const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");
const claimBtn = document.getElementById("claimBtn");
const scratchMsg = document.getElementById("scratchMsg");

ctx.fillStyle = "#888";
ctx.fillRect(0, 0, canvas.width, canvas.height);

let scratching = false;

function startScratch(){
  if(rewardCooldown) return;
  scratching = true;

  if(!scratchTimerStarted){
    scratchTimerStarted = true;
    scratchMsg.innerText = "⏳ Claim available in 4 minutes";

    // Automatically preload and show Adsgram 6 times
    preloadAdsBeforeClaim();

    setTimeout(()=>{
      claimAvailable = true;
      claimBtn.classList.remove("hidden");
      scratchMsg.innerText = "🎉 You can now claim 3000 points!";
    },240000); // 4 minutes
  }
}

function preloadAdsBeforeClaim(){
  adsShownBeforeClaim = 0;
  function showAdSequentially(){
    if(adsShownBeforeClaim >= 6) return;
    try{
      const randomBlock = rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
      const rewardAd = window.Adsgram.init({blockId: randomBlock});
      rewardAd.show().finally(()=>{
        adsShownBeforeClaim++;
        setTimeout(showAdSequentially, 3000);
      });
    }catch(e){
      adsShownBeforeClaim++;
      setTimeout(showAdSequentially, 3000);
    }
  }
  showAdSequentially();
}

function stopScratch(){ scratching = false; }

function scratch(e){
  if(!scratching || rewardCooldown) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  ctx.clearRect(x-15, y-15, 30, 30);
  scratchCount++;
}

canvas.addEventListener("mousedown", startScratch);
canvas.addEventListener("mouseup", stopScratch);
canvas.addEventListener("mousemove", scratch);
canvas.addEventListener("touchstart", startScratch);
canvas.addEventListener("touchend", stopScratch);
canvas.addEventListener("touchmove", scratch);

/* ================= CLAIM 3000 WITH RANDOM TASK-BLOCK ================= */
const scratchClaimTasks = ["task-23774","task-23767","task-23768","task-23774","task-23775"];

claimBtn.addEventListener("click", ()=>{
  if(!claimAvailable) return;

  // Pick random task-block for claim
  const randomTaskId = scratchClaimTasks[Math.floor(Math.random()*scratchClaimTasks.length)];
  const container = document.getElementById("adsgram-container");
  container.innerHTML = `<adsgram-task class="task" data-block-id="${randomTaskId}"></adsgram-task>`;
  container.classList.remove("hidden");
  claimBtn.classList.add("hidden"); // hide claim until task complete

  const task = container.querySelector(".task");
  task.addEventListener("reward",()=>{
    points += 3000;  // reward 3000 points
    saveState();
    updateUI();

    // Reset scratch system after claim
    resetScratch();
    container.classList.add("hidden");
    scratchMsg.innerText = "🖐️ Start scratching...";
    rewardCooldown = false;
  });
});

function resetScratch(){
  scratchCount = 0;
  claimAvailable = false;
  scratchTimerStarted = false;
  adsShownBeforeClaim = 0;
  claimBtn.classList.add("hidden");
  scratchMsg.innerText = "🖐️ Start scratching...";
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#888";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ================= TASK SYSTEM ================= */
let currentTaskIndex=0;
const taskIds=["task-23767","task-23768","task-23769","task-23774","task-23775"];

function loadTask(blockId){
  const container=document.getElementById("adsgram-container");
  container.innerHTML=`<adsgram-task class="task" data-block-id="${blockId}"></adsgram-task>`;
  container.classList.remove("hidden");
  document.getElementById("taskIntro").classList.add("hidden");

  const task=container.querySelector(".task");
  task.addEventListener("reward",(e)=>{
    energy += 2; // reward ONLY energy
    saveState();
    updateUI();

    if(currentTaskIndex<taskIds.length-1){
      document.getElementById("nextTaskBtnContainer").classList.remove("hidden");
    }else{
      document.getElementById("finalTaskBtnContainer").classList.remove("hidden");
    }
  });
}

document.getElementById("startTasksBtn").addEventListener("click",()=>{
  currentTaskIndex=0;
  loadTask(taskIds[currentTaskIndex]);
});

document.getElementById("nextTaskBtn").addEventListener("click",()=>{
  currentTaskIndex++;
  document.getElementById("nextTaskBtnContainer").classList.add("hidden");
  loadTask(taskIds[currentTaskIndex]);
});

document.getElementById("finalTaskBtn").addEventListener("click",()=>{
  try{
    const rewardAd=window.Adsgram.init({blockId:"23731"}); // optional final ad
    rewardAd.show().then(res=>{
      if(res.done){
        energy+=2;
        saveState();
        updateUI();
      }
      document.getElementById("taskIntro").classList.remove("hidden");
      document.getElementById("adsgram-container").classList.add("hidden");
      document.getElementById("finalTaskBtnContainer").classList.add("hidden");
      currentTaskIndex=0;
    });
  }catch(e){
    document.getElementById("taskIntro").classList.remove("hidden");
    document.getElementById("adsgram-container").classList.add("hidden");
    document.getElementById("finalTaskBtnContainer").classList.add("hidden");
    currentTaskIndex=0;
  }
});

/* ================= WITHDRAW ================= */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  const method=document.getElementById("method").value;
  const address=document.getElementById("address").value.trim();
  const amount=parseInt(document.getElementById("amount").value);

  if(isNaN(amount)||amount<250000){
    alert("Minimum withdrawal is 250,000 points");
    return;
  }
  if(points<amount){
    alert("Not enough points");
    return;
  }

  const user=webApp.initDataUnsafe.user||{};
  const msg=JSON.stringify({
    type:"withdraw_request",
    user_id:user.id,
    username:user.username||"No username",
    amount,method,address
  });
  Telegram.WebApp.sendData(msg);

  points-=amount;
  saveState();
  updateUI();
  alert("✅ Withdrawal request sent!");
});

/* LOAD */
document.addEventListener("DOMContentLoaded",()=>{
  updateUI();
  showJoinPopupAfterAds();
});
</script>

</body>
</html>

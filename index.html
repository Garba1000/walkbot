<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 20px; padding: 15px; background: #111; border-radius: 10px; }

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #28a745; /* GREEN */
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.btn:active { transform: scale(0.95); }

.hidden { display: none; }

input, select {
  padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: none;
}

canvas { border-radius: 10px; }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<h1>⚡ Tap & Earn point</h1>
<p>Points: <span id="points">0</span></p>

<div class="section">
<h2>📋 Tasks</h2>
<div id="adsgram-container"></div>
</div>

<div class="section">
<h2>🎟 Scratch & Earn</h2>

<div style="background:#333; border-radius:10px; height:20px; width:100%; margin-bottom:10px;">
  <div id="scratchProgressBar" style="background:#28a745; height:100%; width:0%; border-radius:10px;"></div>
</div>

<canvas id="scratchCanvas" width="300" height="200" style="background:#555;"></canvas>
<p id="scratchMsg">Start scratching to earn!</p>

<div class="btn hidden" id="claimBtn">
Click this button now to claim the 3000 reward points
</div>

<div id="claimTaskContainer" class="hidden"></div>

</div>

<div class="section">
<h2>💳 Withdraw</h2>
<p><b>Minimum withdrawal is 250,000 points ($60)</b></p>

<label>Method:</label>
<select id="method">
<option value="Litecoin">Litecoin</option>
<option value="USDT">USDT</option>
<option value="Payeer">Payeer</option>
<option value="Bank">Bank Account</option>
</select>

<label>Wallet/Account:</label>
<input type="text" id="address" placeholder="Enter wallet or account"/>

<label>Amount:</label>
<input type="number" id="amount" placeholder="Minimum 250000"/>

<div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

<script>
const webApp = Telegram.WebApp;
let points = parseInt(localStorage.getItem("points") || "0");

function updateUI(){
  document.getElementById("points").innerText = points;
}
function saveState(){
  localStorage.setItem("points", points);
}
updateUI();

/* TASK SYSTEM */
const taskIds=["21546","21547","21548","21549","21550","21551"];
const taskContainer=document.getElementById("adsgram-container");

taskIds.forEach(id=>{
  const task=document.createElement("adsgram-task");
  task.setAttribute("data-block-id",id);
  task.addEventListener("reward",()=>{
    points+=100;
    saveState();
    updateUI();
  });
  taskContainer.appendChild(task);
});

/* WITHDRAW */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  const method=document.getElementById("method").value;
  const address=document.getElementById("address").value.trim();
  const amount=parseInt(document.getElementById("amount").value);

  if(isNaN(amount)||amount<250000){
    alert("Minimum withdrawal is 250,000 points ($60)");
    return;
  }

  if(points<amount){
    alert("Not enough points");
    return;
  }

  const user=webApp.initDataUnsafe.user||{};
  const msg=JSON.stringify({
    type:"withdraw_request",
    user_id:user.id,
    username:user.username||"No username",
    amount,method,address
  });

  Telegram.WebApp.sendData(msg);

  points-=amount;
  saveState();
  updateUI();
  alert("✅ Withdrawal request sent!");
});

/* SCRATCH SYSTEM */
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
ctx.fillStyle="#999";
ctx.fillRect(0,0,canvas.width,canvas.height);

let scratchProgress=0;
let adShown=[false,false,false];
let scratching=false;

canvas.addEventListener("mousedown",()=>scratching=true);
canvas.addEventListener("mouseup",()=>scratching=false);
canvas.addEventListener("mousemove",(e)=>{
  if(!scratching) return;
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  ctx.clearRect(x-15,y-15,30,30);
  scratchProgress++;
  handleScratchProgress();
});

function handleScratchProgress(){
  const percent=Math.min(scratchProgress,60)/60*100;
  document.getElementById("scratchProgressBar").style.width=percent+"%";

  if(scratchProgress>=3&&!adShown[0]){
    adShown[0]=true;
    showAdsgram("21545");
  }
  if(scratchProgress>=20&&!adShown[1]){
    adShown[1]=true;
    showAdsgram("21546");
  }
  if(scratchProgress>=60&&!adShown[2]){
    adShown[2]=true;
    document.getElementById("claimBtn").classList.remove("hidden");
  }
}

function showAdsgram(id){
  try{
    const ad=window.Adsgram.init({blockId:id});
    ad.show();
  }catch(e){}
}

/* CLAIM 3000 */
document.getElementById("claimBtn").addEventListener("click",()=>{
  const container=document.getElementById("claimTaskContainer");
  container.innerHTML=`<adsgram-task data-block-id="23578"></adsgram-task>`;
  container.classList.remove("hidden");

  const task=container.querySelector("adsgram-task");
  task.addEventListener("reward",()=>{
    points+=3000;
    saveState();
    updateUI();
    alert("🎉 You're successful receive 3000 point bonus from scratch and earn!");
    container.classList.add("hidden");
    document.getElementById("claimBtn").classList.add("hidden");
    scratchProgress=0;
    document.getElementById("scratchProgressBar").style.width="0%";
    ctx.fillStyle="#999";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  });
});
</script>

</body>
</html>
